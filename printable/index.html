<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Over/Unders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f0f0f0;
      padding: 22px;
      color: #111;
    }

    #sheet {
      max-width: 990px;
      margin: 0 auto;
      background: white;
      padding: 18px 22px 22px;
    }

    /* ── Header ── */
    #sheet-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 3px solid #111;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }
    #sheet-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.1;
    }
    #sheet-header .date-line {
      font-size: 12px;
      color: #555;
      margin-top: 3px;
    }
    #print-btn {
      padding: 7px 15px;
      font-size: 12px;
      font-family: sans-serif;
      cursor: pointer;
      border: 1px solid #222;
      border-radius: 4px;
      background: #111;
      color: white;
      flex-shrink: 0;
    }
    #print-btn:hover { background: #333; }

    /* ── Status ── */
    #status {
      font-size: 14px;
      color: #666;
      font-family: sans-serif;
      padding: 26px 0;
    }
    #status.error { color: #c00; }

    /* ── Game grid ── */
    .game-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }
    .game-row.single { grid-template-columns: 1fr; }

    /* ── Game card ── */
    .game-card {
      border: 1px solid #222;
      border-radius: 4px;
      padding: 16px 12px;
      break-inside: avoid;
      page-break-inside: avoid;
      background: white;
    }
    .card-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 4px;
    }
    .game-time {
      font-size: 12px;
      color: #555;
      border: 1px solid #bbb;
      border-radius: 3px;
      padding: 1px 4px;
      white-space: nowrap;
      font-family: sans-serif;
    }

    /* ── Teams ── */
    .teams-row {
      display: flex;
      gap: 10px;
    }
    .team-col { flex: 1; min-width: 0; }
    .team-divider {
      width: 1px;
      background: #ccc;
      align-self: stretch;
      flex-shrink: 0;
    }
    .team-name {
      font-size: 14px;
      font-weight: 700;
      border-bottom: 2px solid #333;
      padding-bottom: 4px;
      margin-bottom: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Stats table ── */
    .stats-table { width: 100%; border-collapse: collapse; }
    .stats-table td { padding: 5px 0; }
    .stats-table .lbl { color: #666; font-size: 12px; white-space: nowrap; }
    .stats-table .dots {
      width: 100%;
      background-image: radial-gradient(circle, #bbb 1px, transparent 1px);
      background-size: 11px 1px;
      background-repeat: repeat-x;
      background-position: 0 60%;
      padding: 0 3px;
    }
    .stats-table .val {
      text-align: right;
      font-weight: 600;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: #111;
      white-space: nowrap;
    }

    /* ── Notes ── */
    .notes-area {
      margin-top: 10px;
      padding-bottom: 14px;
    }
    .note-line {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 7px;
    }
    .note-line:last-child { margin-bottom: 0; }
    .note-label {
      font-size: 12px;
      color: #888;
      font-style: italic;
      white-space: nowrap;
    }
    .note-label.blank { color: transparent; }
    .note-rule { flex: 1; border-bottom: 0.5px solid #bbb; }

    /* ── Print ── */
    @media print {
      body { background: white; padding: 0; margin: 0; }
      #sheet { padding: 0; max-width: 100%; }
      #print-btn, #status { display: none !important; }
      .game-row { margin-bottom: 10px !important; }
      .game-row.page-break { break-before: page; page-break-before: always; }
      .game-card { padding: 10px 12px; }
      .card-header { margin-bottom: 3px; }
      .team-name { padding-bottom: 3px; margin-bottom: 5px; font-size: 13px; }
      .stats-table td { padding: 3.5px 0; }
      .stats-table .lbl { font-size: 11px; }
      .stats-table .val { font-size: 12px; }
      .notes-area { margin-top: 8px; padding-bottom: 8px; }
      .note-line { margin-bottom: 5px; }
      .note-label { font-size: 11px; }
      .game-time { font-size: 11px; }
    }
    @page { margin: 0.5in; size: 8.5in 11in portrait; }
  </style>
</head>
<body>
<div id="sheet">
  <div id="sheet-header">
    <div>
      <h1>⚾ Daily Over/Unders</h1>
      <div class="date-line" id="date-line">Loading…</div>
    </div>
    <button id="print-btn" onclick="window.print()">Print Sheet</button>
  </div>
  <div id="status">Fetching today's games and live stats…</div>
  <div id="games-container"></div>
</div>

<script>
  const MLB = "https://statsapi.mlb.com/api/v1";

  // ── Date helpers ───────────────────────────────────────────────────────────

  const LA = "America/Los_Angeles";

  function datePT(offsetDays = 0) {
    const d = new Date();
    if (offsetDays) d.setDate(d.getDate() + offsetDays);
    return d.toLocaleDateString("en-CA", { timeZone: LA });
  }

  function timePT(utcStr) {
    return new Date(utcStr).toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit", timeZone: LA, hour12: true
    });
  }

  // ── Stats helpers ──────────────────────────────────────────────────────────

  function avg(arr) {
    return arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : "—";
  }

  // ── API ────────────────────────────────────────────────────────────────────

  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  const INVALID_STATES = new Set(["Cancelled","Postponed","Suspended"]);

  async function fetchTodayGames(date) {
    const data = await fetchJSON(`${MLB}/schedule?sportId=1&date=${date}&hydrate=team,linescore`);
    return (data.dates?.[0]?.games || []).filter(g => !INVALID_STATES.has(g.status?.detailedState));
  }

  async function fetchSeasonAvg(teamId, season) {
    const data = await fetchJSON(`${MLB}/teams/${teamId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
    const s = data.stats?.[0]?.splits?.[0]?.stat;
    if (!s) return "—";
    return (parseInt(s.runs || 0) / parseInt(s.gamesPlayed || 1)).toFixed(2);
  }

  async function fetchRecentRuns(teamId, before, season) {
    const data = await fetchJSON(
      `${MLB}/schedule?sportId=1&teamId=${teamId}&startDate=${season}-01-01&endDate=${before}&hydrate=linescore&gameType=R`
    );
    const runs = [];
    for (const dateObj of (data.dates || []).reverse()) {
      for (const g of (dateObj.games || []).reverse()) {
        if (g.status?.abstractGameState !== "Final") continue;
        const isHome = g.teams?.home?.team?.id === teamId;
        const score = isHome ? g.teams.home.score : g.teams.away.score;
        if (score != null) runs.push(score);
        if (runs.length === 9) return runs;
      }
    }
    return runs;
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function statsRows(stats) {
    if (!stats) return `<tr><td colspan="3" class="lbl" style="padding:6px 0;font-style:italic;">Loading…</td></tr>`;
    return [
      ["Last game",    stats.runs[0] ?? "—"],
      ["Last 3 games", avg(stats.runs.slice(0, 3))],
      ["Last 6 games", avg(stats.runs.slice(0, 6))],
      ["Last 9 games", avg(stats.runs.slice(0, 9))],
      ["Season AVG",   stats.seasonAvg],
    ].map(([l, v]) =>
      `<tr><td class="lbl">${l}</td><td class="dots"></td><td class="val">${v}</td></tr>`
    ).join("");
  }

  function teamColHTML(name, uid) {
    return `
      <div class="team-col">
        <div class="team-name">${name}</div>
        <table class="stats-table"><tbody id="s-${uid}">${statsRows(null)}</tbody></table>
      </div>`;
  }

  function gameCardHTML(g) {
    const { id: hid, name: hname } = g.teams.home.team;
    const { id: aid, name: aname } = g.teams.away.team;
    const pk = g.gamePk;
    return `
      <div class="game-card">
        <div class="card-header"><div class="game-time">${timePT(g.gameDate)}</div></div>
        <div class="teams-row">
          ${teamColHTML(aname, `${aid}-${pk}`)}
          <div class="team-divider"></div>
          ${teamColHTML(hname, `${hid}-${pk}`)}
        </div>
        <div class="notes-area">
          <div class="note-line"><span class="note-label">Notes:</span><div class="note-rule"></div></div>
          <div class="note-line"><span class="note-label blank">Notes:</span><div class="note-rule"></div></div>
          <div class="note-line"><span class="note-label blank">Notes:</span><div class="note-rule"></div></div>
        </div>
      </div>`;
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  async function init() {
    const now       = new Date();
    const today     = now.toLocaleDateString("en-CA", { timeZone: LA });
    const yesterday = datePT(-1);
    const season    = today.slice(0, 4);

    document.getElementById("date-line").textContent =
      now.toLocaleDateString("en-US", {
        timeZone: LA, weekday: "long", year: "numeric", month: "long", day: "numeric"
      }) + " · All times Pacific";

    const statusEl = document.getElementById("status");
    const gamesEl  = document.getElementById("games-container");

    try {
      const games = await fetchTodayGames(today);
      if (!games.length) { statusEl.textContent = "No games scheduled today."; return; }

      // Render card shells
      statusEl.style.display = "none";
      const rows = Array.from({ length: Math.ceil(games.length / 2) }, (_, i) => games.slice(i * 2, i * 2 + 2));
      gamesEl.innerHTML = rows.map((row, i) =>
        `<div class="game-row${row.length === 1 ? " single" : ""}${i > 0 && i % 3 === 0 ? " page-break" : ""}">${row.map(gameCardHTML).join("")}</div>`
      ).join("");

      // Map each unique team to its gamePks (a team can appear once, but map handles edge cases)
      const teamMap = {};
      for (const g of games) {
        for (const side of ["home", "away"]) {
          const id = g.teams[side].team.id;
          (teamMap[id] = teamMap[id] || []).push(g.gamePk);
        }
      }

      // Fetch all team stats in parallel, patch DOM as each resolves
      await Promise.all(Object.entries(teamMap).map(async ([idStr, pks]) => {
        const teamId = Number(idStr);
        const [seasonAvg, runs] = await Promise.all([
          fetchSeasonAvg(teamId, season),
          fetchRecentRuns(teamId, yesterday, season),
        ]);
        const stats = { seasonAvg, runs };
        const html  = statsRows(stats);
        for (const pk of pks) {
          const el = document.getElementById(`s-${teamId}-${pk}`);
          if (el) el.innerHTML = html;
        }
      }));

    } catch (e) {
      statusEl.style.display = "";
      statusEl.className = "error";
      statusEl.textContent = "Error: " + (e.message || e);
      console.error(e);
    }
  }

  init();
</script>
</body>
</html>
